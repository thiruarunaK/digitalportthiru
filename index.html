<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalogue</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
            text-align: center;
        }

        h1 {
            margin: 20px;
        }

        /* Product container */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }

        /* Product card */
        .product {
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            width: 220px;
            margin: 15px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .product:hover {
            transform: translateY(-5px);
        }

        /* Image */
        .product img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            object-fit: cover;
        }

        /* Button */
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #218838;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .product {
                width: 45%;
            }
        }

        @media (max-width: 480px) {
            .product {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <h1>My Product Catalogue</h1>

    <div class="container">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400&q=80" alt="Pair of black wireless headphones">
            <h2>Headphone</h2>
            <p>Price: ₹500</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <img src="https://images.pexels.com/photos/1779487/pexels-photo-1779487.jpeg?auto=compress&cs=tinysrgb&w=400" alt="White USB-C Fast Charging Cable">
            <h2>Charger Cable</h2>
            <p>Price: ₹800</p>
            <button>Buy Now</button>
        </div>

      <div class="product">
    <img src="https://images.unsplash.com/photo-1518448028301-0c61e1c6a31f?auto=format&fit=crop&w=400&q=80" alt="Black Bluetooth earphones">
    <h2>Ear Buds</h2>
    <p>Price: ₹1200</p>
    <button>Buy Now</button>
</div>

        <div class="product">
            <img src="https://yavuzceliker.github.io/sample-images/image-1021.jpg" alt="Generic USB pendrive">
            <h2>Pendrive</h2>
            <p>Price: ₹700</p>
            <button>Buy Now</button>
        </div>

    </div>

</body>
</html>
