<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalogue</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f5f5f5;
    text-align: center;
}

h1 {
    margin: 20px;
}

/* Product container */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

/* Product card */
.product {
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    width: 200px;
    margin: 15px;
    padding: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* Image */
.product img {
    width: 100%;
    border-radius: 10px;
}

/* Button */
button {
    background-color: #28a745;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #218838;
}
    </style>
</head>
<body>

    <h1>My Product Catalogue</h1>

    <div class="container">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=400" alt="Pair of black wireless headphones" width="400" height="auto">

            <h2>Headphone</h2>
            <p>Price: ₹500</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <img src="https://images.pexels.com/photos/1779487/pexels-photo-1779487.jpeg" alt="White USB-C Fast Charging Cable" width="300" height="300">

            <h2>Charger cable</h2>
            <p>Price: ₹800</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <img src="https://example.com/path-to-earbuds.jpg" alt="Wireless Earbuds with Charging Case" width="500" height="300">

            <h2>Ear Buds</h2>
            <p>Price: ₹1200</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <img src="https://yavuzceliker.github.io/sample-images/image-1021.jpg" alt="Generic USB pendrive" width="300" height="auto">

            <h2>Pendrive</h2>
            <p>Price: ₹700</p>
            <button>Buy Now</button>
        </div>

    </div>

</body>
</html>
